{% set name = "langchain-openai" %}
{% set version = "0.3.18" %}
package:
  name: {{ name|lower }}
  version: {{ version }}
source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/langchain_openai-{{ version }}.tar.gz
  sha256: 8e0769e4042de099a6217bbdccf7cc06b14c462e900424cbfc340c5f46f079ba
build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
requirements:
  host:
    - python >=3.9
    - pdm-backend
    - pip
  run:
    - python >=3.9
    - langchain-core <1.0.0,>=0.3.61
    - openai <2.0.0,>=1.68.2
    - tiktoken <1,>=0.7
test:
  imports:
    - langchain_openai
  commands:
    - pip check
  requires:
    - pip
about:
  summary: An integration package connecting OpenAI and LangChain
  license: MIT
  license_file: LICENSE
extra:
  recipe-maintainers:
    - Arishamays1
